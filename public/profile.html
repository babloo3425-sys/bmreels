<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="profilePage"> 
  
    <div class="profileHeader">

    <img id="profilePic" src="https://i.pravatar.cc/100" class="profilePic">

    <div class="profileInfo">

      <p id="followersCount"></p>

    </div>

  </div>

  <hr>

  <div id="profileVideos" class="videoGrid"></div>
  
</div>  

<script src="profile.js"></script>
</body>
</html>
