<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    
  <!-- 🔥 3 dots menu -->
<div id="menuWrapper">
  <button id="menuBtn">⋮</button>

  <div id="menuBox">
    <div class="menuItem" id="notifBtn">Notifications</div>
    <div class="menuItem" id="termsBtn">Terms & Conditions</div>
    <div class="menuItem" id="licenceBtn">Licence</div>
    <div class="menuItem" id="logoutBtn">Logout</div>
  </div>
</div>
    <div class="profilePage"> 
  
    <div class="profileHeader">

    <img id="profilePic" src="https://i.pravatar.cc/100" class="profilePic">
    <input type="file" id="dpInput" accept="image/*" hidden>

    <div class="profileInfo">
      <h2 id="username"></h2>
      <p id="followersCount"></p>
      <p id="videoCount"></p>

      <button id="followBtn">Follow</button>
    </div>

  </div>

  <hr>

  <div id="profileVideos" class="videoGrid"></div>
  
</div>  

<script src="profile.js"></script>
</body>
</html>
